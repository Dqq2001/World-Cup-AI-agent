services:
  - type: web
    name: worldcup-ai-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_INTEL_MODEL
        value: gpt-5.5
      - key: REFRESH_ADMIN_USERNAME
        sync: false
      - key: REFRESH_ADMIN_PASSWORD
        sync: false
